<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#14171A" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Pipeline — project management, invoicing, calendar, tickets and reports in one workspace." />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Expanded:wght@600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
    <title>Pipeline</title>
    <script>
      // Supabase invite/recovery emails deliver a login token in the URL
      // hash (#access_token=...&type=invite or &type=recovery). The
      // Supabase client auto-reads and clears that hash on init
      // (detectSessionInUrl), which can race with checking it later in
      // React. Capturing it here, in a plain synchronous script that runs
      // before any module script, avoids that race — it's how the app
      // tells "just accepted an invite" or "just clicked a password reset
      // link" apart from an ordinary return visit.
      if (window.location.hash.includes('type=invite')) {
        sessionStorage.setItem('pipeline_auth_type', 'invite')
      } else if (window.location.hash.includes('type=recovery')) {
        sessionStorage.setItem('pipeline_auth_type', 'recovery')
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
